# 【CC-CTO 数字归乡下载引擎 · GitHub Actions workflow v1 · 2026-06-11】
# 放到部署仓库的 .github/workflows/digui.yml。云端跑 digui_engine_v1.py。
# matrix 扇出并行(航母甲板)→ 各分片抓一片清单 → WebP 入 R2(经 Worker)、PDF 出 artifact。
# 后台"点启动" = 后台调 GitHub API 以 workflow_dispatch + inputs 触发本 workflow。
# 仓库须含: 脚本/digui_engine_v1.py + 脚本/_naming.py + 清单/{csv}
name: digui-download

on:
  workflow_dispatch:
    inputs:
      csv:
        description: "清单 CSV(仓库内相对路径)"
        required: true
        default: "清单/内閣子部补漏.csv"
      source:
        description: "馆名(决定命名规则: 内閣/NDL/京大/普林…)"
        required: true
        default: "内閣"
      shard_count:
        description: "并行分片数(加大=更快,≤8)"
        required: true
        default: "8"
      page_workers:
        description: "单本页级并发"
        required: true
        default: "10"
      limit:
        description: "每片最多本数(0=全部;首测填 1~5 验通)"
        required: true
        default: "0"

jobs:
  download:
    runs-on: ubuntu-latest          # 云端 runner;抓取经 CF Worker(全球 IP),合规
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]   # 8 路上限;shard >= shard_count 的自动跳过
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 装依赖
        run: pip install pillow pymupdf
      - name: 跑引擎(本分片)
        if: ${{ matrix.shard < fromJSON(github.event.inputs.shard_count) }}
        env:
          WORKERS: "https://2.1fz.dpdns.org,https://2.freezz.dpdns.org,https://2.bnp.indevs.in"
          UA: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) GF/2.1"   # Worker 白名单 UA
        run: |
          python 脚本/digui_engine_v1.py \
            --csv "${{ github.event.inputs.csv }}" \
            --source "${{ github.event.inputs.source }}" \
            --out "./pdf_out" \
            --workers ${{ github.event.inputs.page_workers }} \
            --limit ${{ github.event.inputs.limit }} \
            --shard-count ${{ github.event.inputs.shard_count }} \
            --shard-index ${{ matrix.shard }} \
            --result "./_result_s${{ matrix.shard }}.csv"
      - name: 收 PDF + 账本(artifact → 回 F 盘)
        if: ${{ always() && matrix.shard < fromJSON(github.event.inputs.shard_count) }}
        uses: actions/upload-artifact@v4
        with:
          name: digui-${{ github.event.inputs.source }}-s${{ matrix.shard }}
          path: |
            pdf_out/**
            _result_*.csv
          retention-days: 7
